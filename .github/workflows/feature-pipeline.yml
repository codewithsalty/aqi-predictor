name: Feature Pipeline
run-name: Feature Pipeline - ${{ github.event_name }} #${{ github.run_number }}

permissions:
  contents: read

concurrency:
  group: feature-pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Primary hourly trigger. GitHub schedules use UTC, so Pakistan time is UTC+5.
    - cron: "17 * * * *"
    # Backup staggered trigger. Public GitHub cron jobs can be delayed/dropped under load;
    # ingestion is deduplicated by city + timestamp, so this keeps the feature store fresh.
    - cron: "47 * * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/feature-pipeline.yml"
      - "backend/app/**"
      - "backend/scripts/run_ingest.py"
      - "backend/requirements.txt"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show automation context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "utc_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Run feature ingestion
        run: python -m scripts.run_ingest
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          CITY: ${{ secrets.CITY }}
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}

      - name: Run daily training catch-up when due
        continue-on-error: true
        run: python -m scripts.run_train_if_due
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          CITY: ${{ secrets.CITY }}
          MODEL_STORAGE_DIR: ./artifacts/models
          TRAINING_MIN_INTERVAL_HOURS: "20"
